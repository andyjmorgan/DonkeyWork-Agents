apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: donkeywork-agents
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api
        orleans/clusterId: donkeywork-agents
        orleans/serviceId: donkeywork-agents
    spec:
      serviceAccountName: api-silo
      terminationGracePeriodSeconds: 180
      hostAliases:
        - ip: "10.43.82.168"
          hostnames:
            - auth.donkeywork.dev
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: seaweedfs-buckets
      containers:
        - name: api
          image: 192.168.0.140:5555/donkeywork-agents/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 11111
              name: orleans-silo
            - containerPort: 30000
              name: orleans-gateway
          volumeMounts:
            - name: storage
              mountPath: /mnt/storage
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: ASPNETCORE_FORWARDEDHEADERS_ENABLED
              value: "true"
            - name: Persistence__ConnectionString
              value: "Host=postgres;Port=5432;Database=donkeywork_agents;Username=donkeywork;Password=P@ssw0rd10"
            - name: Persistence__EncryptionKey
              valueFrom:
                secretKeyRef:
                  name: donkeywork-agents-secrets
                  key: ENCRYPTION_KEY
            - name: Keycloak__Authority
              value: "https://auth.donkeywork.dev/realms/Agents"
            - name: Keycloak__InternalAuthority
              value: "http://keycloak.infrastructure.svc.cluster.local:8080/realms/Agents"
            - name: Keycloak__Audience
              value: "donkeywork-agents-api"
            - name: Keycloak__RequireHttpsMetadata
              value: "false"
            - name: Keycloak__FrontendUrl
              value: "https://agents.donkeywork.dev"
            - name: Storage__ServiceUrl
              value: "http://seaweedfs:8333"
            - name: Storage__AccessKey
              valueFrom:
                secretKeyRef:
                  name: donkeywork-agents-secrets
                  key: S3_ACCESS_KEY
            - name: Storage__SecretKey
              valueFrom:
                secretKeyRef:
                  name: donkeywork-agents-secrets
                  key: S3_SECRET_KEY
            - name: Storage__DefaultBucket
              value: "files"
            - name: Storage__UsePathStyleAddressing
              value: "true"
            - name: Storage__FileSystemBasePath
              value: "/mnt/storage"
            - name: Nats__Url
              value: "nats://nats-0.nats-headless.donkeywork-agents.svc.cluster.local:4222,nats://nats-1.nats-headless.donkeywork-agents.svc.cluster.local:4222,nats://nats-2.nats-headless.donkeywork-agents.svc.cluster.local:4222"
            - name: Agents__ExecutionTimeout
              value: "00:20:00"
            - name: Agents__StreamRetention
              value: "1.00:00:00"
            - name: Sandbox__ManagerBaseUrl
              value: "http://sandbox-manager:8080"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
