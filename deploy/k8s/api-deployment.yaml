apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: donkeywork-agents
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: api
        orleans/serviceId: donkeywork-agents
        orleans/clusterId: donkeywork-agents
    spec:
      serviceAccountName: api-silo
      terminationGracePeriodSeconds: 180
      hostAliases:
        - ip: "10.43.82.168"
          hostnames:
            - "auth.donkeywork.dev"
      containers:
        - name: api
          image: ghcr.io/andyjmorgan/donkeywork-agents/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 11111
              name: orleans-silo
            - containerPort: 30000
              name: orleans-gateway
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: ASPNETCORE_FORWARDEDHEADERS_ENABLED
              value: "true"
            - name: Persistence__ConnectionString
              value: "Host=postgres;Port=5432;Database=donkeywork_agents;Username=donkeywork;Password=P@ssw0rd10"
            - name: Persistence__EncryptionKey
              valueFrom:
                secretKeyRef:
                  name: donkeywork-agents-secrets
                  key: ENCRYPTION_KEY
            - name: Keycloak__Authority
              value: "https://auth.donkeywork.dev/realms/Agents"
            - name: Keycloak__InternalAuthority
              value: "http://keycloak.infrastructure.svc.cluster.local:8080/realms/Agents"
            - name: Keycloak__Audience
              value: "donkeywork-agents-api"
            - name: Keycloak__RequireHttpsMetadata
              value: "false"
            - name: Keycloak__FrontendUrl
              value: "https://agents.donkeywork.dev"
            - name: Storage__ServiceUrl
              value: "http://seaweedfs:8333"
            - name: Storage__AccessKey
              valueFrom:
                secretKeyRef:
                  name: donkeywork-agents-secrets
                  key: S3_ACCESS_KEY
            - name: Storage__SecretKey
              valueFrom:
                secretKeyRef:
                  name: donkeywork-agents-secrets
                  key: S3_SECRET_KEY
            - name: Storage__DefaultBucket
              value: "files"
            - name: Storage__UsePathStyleAddressing
              value: "true"
            - name: RabbitMqStream__Host
              value: "rabbitmq.rabbitmq.svc.cluster.local"
            - name: RabbitMqStream__Port
              value: "5552"
            - name: RabbitMqStream__Username
              valueFrom:
                secretKeyRef:
                  name: donkeywork-agents-secrets
                  key: RABBITMQ_USER
            - name: RabbitMqStream__Password
              valueFrom:
                secretKeyRef:
                  name: donkeywork-agents-secrets
                  key: RABBITMQ_PASSWORD
            - name: RabbitMqStream__VirtualHost
              value: "/"
            - name: Agents__ExecutionTimeout
              value: "00:20:00"
            - name: Agents__StreamRetention
              value: "1.00:00:00"
            - name: Actors__SeaweedFsBaseUrl
              value: "http://seaweedfs:8888"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
