# Patch to add the filer port (8888) to the existing SeaweedFS service.
# Apply with: kubectl patch svc seaweedfs -n donkeywork-agents --type merge -p "$(cat seaweedfs-service-patch.yaml)"
#
# Or apply the full service definition below:
apiVersion: v1
kind: Service
metadata:
  name: seaweedfs
  namespace: donkeywork-agents
spec:
  type: ClusterIP
  selector:
    app: seaweedfs
  ports:
    - name: s3
      port: 8333
      targetPort: 8333
    - name: filer
      port: 8888
      targetPort: 8888
