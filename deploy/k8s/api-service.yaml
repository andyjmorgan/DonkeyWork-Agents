apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: donkeywork-agents
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: orleans-silo
      port: 11111
      targetPort: 11111
    - name: orleans-gateway
      port: 30000
      targetPort: 30000
