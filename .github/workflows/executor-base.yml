name: Executor Base Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/sandbox/CodeSandbox.Executor/Dockerfile.base'
  pull_request:
    branches: [main]
    paths:
      - 'src/sandbox/CodeSandbox.Executor/Dockerfile.base'

concurrency:
  group: executor-base-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: 192.168.0.140:5555
  IMAGE_NAME: donkeywork-agents/codesandbox-executor-base

permissions:
  contents: read

jobs:
  build-base:
    name: Build Executor Base Image
    runs-on: [self-hosted, Linux, X64]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        if: github.event_name != 'pull_request'

      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Login to Nexus
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.NEXUS_PASSWORD }}" | docker login http://${{ env.REGISTRY }} -u ${{ secrets.NEXUS_USERNAME }} --password-stdin

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=raw,value={{date 'YYYYMMDD'}},enable={{is_default_branch}}

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/sandbox/CodeSandbox.Executor/Dockerfile.base
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.title=CodeSandbox Executor Base
            org.opencontainers.image.description=Base image with Python, Node.js, Git, and GitHub CLI for sandbox execution
            org.opencontainers.image.vendor=DonkeyWork
          cache-from: type=gha,scope=executor-base
          cache-to: type=gha,mode=max,scope=executor-base
          platforms: ${{ github.event_name != 'pull_request' && 'linux/amd64,linux/arm64' || '' }}
          network: host

      - name: Generate summary
        if: github.event_name != 'pull_request'
        run: |
          echo "## Executor Base Image Published" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
