name: Docker Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ${{ vars.DOCKER_REGISTRY }}
  BACKEND_IMAGE: donkeywork-agents/api
  FRONTEND_IMAGE: donkeywork-agents/frontend
  SANDBOX_MANAGER_IMAGE: donkeywork-agents/sandbox-manager
  SANDBOX_EXECUTOR_IMAGE: donkeywork-agents/sandbox-executor
  SANDBOX_AUTHPROXY_IMAGE: donkeywork-agents/sandbox-authproxy

jobs:
  changes:
    name: Detect Changes
    runs-on: [self-hosted, Linux, X64]
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      sandbox-manager: ${{ steps.filter.outputs.sandbox-manager }}
      sandbox-executor: ${{ steps.filter.outputs.sandbox-executor }}
      sandbox-executor-base: ${{ steps.filter.outputs.sandbox-executor-base }}
      sandbox-authproxy: ${{ steps.filter.outputs.sandbox-authproxy }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/**'
              - '!src/frontend/**'
              - '!src/sandbox/**'
              - 'test/**'
              - '!test/sandbox/**'
              - '*.sln'
              - 'Dockerfile'
              - '.github/workflows/docker-build.yml'
            frontend:
              - 'src/frontend/**'
              - '.github/workflows/docker-build.yml'
            sandbox-manager:
              - 'src/sandbox/CodeSandbox.Manager/**'
              - 'src/sandbox/CodeSandbox.Contracts/**'
            sandbox-executor:
              - 'src/sandbox/CodeSandbox.Executor/**'
              - 'src/sandbox/CodeSandbox.Contracts/**'
            sandbox-executor-base:
              - 'src/sandbox/CodeSandbox.Executor/Dockerfile.base'
            sandbox-authproxy:
              - 'src/sandbox/CodeSandbox.AuthProxy/**'
              - 'src/sandbox/CodeSandbox.Contracts/**'

  test-backend:
    name: Test Backend
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: [self-hosted, Linux, X64]
    env:
      DOTNET_INSTALL_DIR: ${{ github.workspace }}/.dotnet
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Configure NuGet for local proxy
        run: cp _nuget.config nuget.config

      - name: Restore dependencies
        run: dotnet restore DonkeyWork.Agents.sln

      - name: Build
        run: dotnet build DonkeyWork.Agents.sln -c Release --no-restore

      - name: Test
        run: >-
          dotnet test DonkeyWork.Agents.sln -c Release --no-build --verbosity normal
          --filter "FullyQualifiedName!~CodeSandbox&Category!=Integration"

  test-sandbox:
    name: Test Sandbox
    needs: [changes]
    if: needs.changes.outputs.sandbox-executor == 'true'
    runs-on: [self-hosted, Linux, X64]
    env:
      DOTNET_INSTALL_DIR: ${{ github.workspace }}/.dotnet
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Configure NuGet for local proxy
        run: cp _nuget.config nuget.config

      - name: Restore dependencies
        run: dotnet restore DonkeyWork.Agents.sln

      - name: Build
        run: dotnet build DonkeyWork.Agents.sln -c Release --no-restore

      - name: Get Executor Base Image
        run: |
          if [ "${{ needs.changes.outputs.sandbox-executor-base }}" == "true" ]; then
            echo "Dockerfile.base changed, building locally..."
            docker build -t ${{ vars.DOCKER_REGISTRY }}/donkeywork-agents/codesandbox-executor-base:latest -f src/sandbox/CodeSandbox.Executor/Dockerfile.base .
          else
            echo "Pulling base image from Nexus..."
            docker pull ${{ vars.DOCKER_REGISTRY }}/donkeywork-agents/codesandbox-executor-base:latest || {
              echo "Pull failed, building locally as fallback..."
              docker build -t ${{ vars.DOCKER_REGISTRY }}/donkeywork-agents/codesandbox-executor-base:latest -f src/sandbox/CodeSandbox.Executor/Dockerfile.base .
            }
          fi

      - name: Configure NuGet for local proxy
        run: cp _nuget.config nuget.config

      - name: Build Executor Docker Image for Tests
        run: |
          cp nuget.config src/sandbox/nuget.config
          docker build -t codesandbox-executor:test -f src/sandbox/CodeSandbox.Executor/Dockerfile src/sandbox/

      - name: Test
        run: >-
          dotnet test DonkeyWork.Agents.sln -c Release --no-build --verbosity normal
          --filter "FullyQualifiedName~CodeSandbox"

  test-frontend:
    name: Test Frontend
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: [self-hosted, Linux, X64]
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: src/frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint || true

      - name: Type check
        run: pnpm --filter @donkeywork/web exec tsc -b

      - name: Test
        run: pnpm run test:run

  build-backend:
    name: Build Backend Docker Image
    needs: [changes, test-backend]
    if: |
      always() &&
      needs.changes.outputs.backend == 'true' &&
      needs.test-backend.result == 'success'
    runs-on: [self-hosted, Linux, X64]
    env:
      DOTNET_INSTALL_DIR: ${{ github.workspace }}/.dotnet
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Configure NuGet for local proxy
        run: cp _nuget.config nuget.config

      - name: Publish
        run: dotnet publish src/DonkeyWork.Agents.Api/DonkeyWork.Agents.Api.csproj -c Release -o ./publish

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Login to Nexus
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=sha,prefix=

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.runtime
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64

  build-frontend:
    name: Build Frontend Docker Image
    needs: [changes, test-frontend]
    if: |
      always() &&
      needs.changes.outputs.frontend == 'true' &&
      (needs.test-frontend.result == 'success' || needs.test-frontend.result == 'skipped')
    runs-on: [self-hosted, Linux, X64]
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Login to Nexus
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=sha,prefix=

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./src/frontend
          file: ./src/frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64

  build-sandbox-manager:
    name: Build Sandbox Manager Docker Image
    needs: [changes]
    if: needs.changes.outputs.sandbox-manager == 'true'
    runs-on: [self-hosted, Linux, X64]
    env:
      DOTNET_INSTALL_DIR: ${{ github.workspace }}/.dotnet
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Configure NuGet for local proxy
        run: cp _nuget.config nuget.config

      - name: Publish Manager
        run: dotnet publish src/sandbox/CodeSandbox.Manager/CodeSandbox.Manager.csproj -c Release -o ./src/sandbox/CodeSandbox.Manager/publish

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Login to Nexus
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.SANDBOX_MANAGER_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=sha,prefix=

      - name: Build and push sandbox manager image
        uses: docker/build-push-action@v6
        with:
          context: ./src/sandbox/CodeSandbox.Manager
          file: ./src/sandbox/CodeSandbox.Manager/Dockerfile.runtime
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64

  build-sandbox-executor:
    name: Build Sandbox Executor Docker Image
    needs: [changes, test-sandbox]
    if: |
      always() &&
      needs.changes.outputs.sandbox-executor == 'true' &&
      needs.test-sandbox.result == 'success'
    runs-on: [self-hosted, Linux, X64]
    env:
      DOTNET_INSTALL_DIR: ${{ github.workspace }}/.dotnet
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Configure NuGet for local proxy
        run: cp _nuget.config nuget.config

      - name: Publish Executor
        run: dotnet publish src/sandbox/CodeSandbox.Executor/CodeSandbox.Executor.csproj -c Release -o ./src/sandbox/CodeSandbox.Executor/publish

      - name: Get Executor Base Image
        run: |
          if [ "${{ needs.changes.outputs.sandbox-executor-base }}" == "true" ]; then
            echo "Dockerfile.base changed, building locally..."
            docker build -t ${{ vars.DOCKER_REGISTRY }}/donkeywork-agents/codesandbox-executor-base:latest -f src/sandbox/CodeSandbox.Executor/Dockerfile.base .
          else
            echo "Pulling base image from Nexus..."
            docker pull ${{ vars.DOCKER_REGISTRY }}/donkeywork-agents/codesandbox-executor-base:latest || {
              echo "Pull failed, building locally as fallback..."
              docker build -t ${{ vars.DOCKER_REGISTRY }}/donkeywork-agents/codesandbox-executor-base:latest -f src/sandbox/CodeSandbox.Executor/Dockerfile.base .
            }
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Login to Nexus
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.SANDBOX_EXECUTOR_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=sha,prefix=

      - name: Build and push sandbox executor image
        uses: docker/build-push-action@v6
        with:
          context: ./src/sandbox/CodeSandbox.Executor
          file: ./src/sandbox/CodeSandbox.Executor/Dockerfile.runtime
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64

      - name: Push Executor Base Image
        if: github.event_name != 'pull_request' && needs.changes.outputs.sandbox-executor-base == 'true'
        run: docker push ${{ vars.DOCKER_REGISTRY }}/donkeywork-agents/codesandbox-executor-base:latest

  build-sandbox-authproxy:
    name: Build Sandbox AuthProxy Docker Image
    needs: [changes]
    if: needs.changes.outputs.sandbox-authproxy == 'true'
    runs-on: [self-hosted, Linux, X64]
    env:
      DOTNET_INSTALL_DIR: ${{ github.workspace }}/.dotnet
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Configure NuGet for local proxy
        run: cp _nuget.config nuget.config

      - name: Publish AuthProxy
        run: dotnet publish src/sandbox/CodeSandbox.AuthProxy/CodeSandbox.AuthProxy.csproj -c Release -o ./src/sandbox/CodeSandbox.AuthProxy/publish

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Login to Nexus
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.SANDBOX_AUTHPROXY_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=sha,prefix=

      - name: Build and push sandbox authproxy image
        uses: docker/build-push-action@v6
        with:
          context: ./src/sandbox/CodeSandbox.AuthProxy
          file: ./src/sandbox/CodeSandbox.AuthProxy/Dockerfile.runtime
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64

