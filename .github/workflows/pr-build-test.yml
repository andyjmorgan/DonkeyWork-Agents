name: PR Build & Test

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: [self-hosted, Linux, X64]
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      sandbox: ${{ steps.filter.outputs.sandbox }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/**'
              - '!src/frontend/**'
              - '!src/sandbox/**'
              - 'test/**'
              - '!test/sandbox/**'
              - '*.sln'
              - 'Dockerfile'
            frontend:
              - 'src/frontend/**'
            sandbox:
              - 'src/sandbox/**'
              - 'test/sandbox/**'

  backend-build-test:
    name: Backend Build & Test
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: [self-hosted, Linux, X64]
    env:
      DOTNET_INSTALL_DIR: ${{ github.workspace }}/.dotnet
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Configure NuGet for local proxy
        run: cp _nuget.config nuget.config

      - name: Restore dependencies
        run: dotnet restore DonkeyWork.Agents.sln

      - name: Build
        run: dotnet build DonkeyWork.Agents.sln -c Release --no-restore

      - name: Test
        run: |
          dotnet test DonkeyWork.Agents.sln -c Release --no-build --verbosity normal \
            --filter "FullyQualifiedName!~CodeSandbox"

  sandbox-build-test:
    name: Sandbox Build & Test
    needs: [changes]
    if: needs.changes.outputs.sandbox == 'true'
    runs-on: [self-hosted, Linux, X64]
    env:
      DOTNET_INSTALL_DIR: ${{ github.workspace }}/.dotnet
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Configure NuGet for local proxy
        run: cp _nuget.config nuget.config

      - name: Restore dependencies
        run: dotnet restore DonkeyWork.Agents.sln

      - name: Build
        run: dotnet build DonkeyWork.Agents.sln -c Release --no-restore

      - name: Test
        run: |
          dotnet test DonkeyWork.Agents.sln -c Release --no-build --verbosity normal \
            --filter "FullyQualifiedName~CodeSandbox&FullyQualifiedName!~IntegrationTests"

  frontend-build-test:
    name: Frontend Build & Test
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: [self-hosted, Linux, X64]
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: src/frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm --filter @donkeywork/web exec tsc -b

      - name: Test
        run: pnpm run test:run

      - name: Build
        run: pnpm run build
