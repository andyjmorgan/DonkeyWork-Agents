syntax = "proto3";

package donkeywork.credentials;

option csharp_namespace = "CodeSandbox.Contracts.Grpc.Credentials";

service CredentialStoreService {
  rpc GetDomainCredentials(GetDomainCredentialsRequest) returns (GetDomainCredentialsResponse);
}

message GetDomainCredentialsRequest {
  string base_domain = 1;
}

message GetDomainCredentialsResponse {
  bool found = 1;
  map<string, string> headers = 2;
}
