syntax = "proto3";

package codesandbox.mcpserver;

option csharp_namespace = "CodeSandbox.Contracts.Grpc.McpServer";

service McpServerService {
  // Start the MCP stdio process inside this pod.
  // Replaces: POST /api/mcp/start (SSE stream response)
  // Source: DonkeyWork-CodeSandbox-Manager/src/DonkeyWork.CodeSandbox.McpServer/Endpoints/McpEndpoints.cs StartAsync()
  rpc Start(McpStartRequest) returns (stream McpStartEvent);

  // Proxy a JSON-RPC request to the MCP stdio process and return the response.
  // Replaces: POST /mcp
  // Source: McpEndpoints.cs ProxyRequestAsync()
  // JSON-RPC body passed as opaque string (manager is a dumb pipe).
  rpc ProxyRequest(JsonRpcRequest) returns (JsonRpcResponse);

  // Stream server-initiated notifications (elicitations, progress, etc).
  // Replaces: GET /mcp (SSE stream)
  // Source: McpEndpoints.cs NotificationStreamAsync()
  rpc StreamNotifications(StreamNotificationsRequest) returns (stream JsonRpcNotification);

  // Send a JSON-RPC response back to the MCP server process (for elicitation responses).
  // Replaces: StdioBridge.SendResponseAsync()
  // This allows the client to respond to server-initiated requests (elicitations).
  rpc SendResponse(JsonRpcResponseMessage) returns (SendResponseAck);

  // Get the current state of the MCP process.
  // Replaces: GET /api/mcp/status
  // Source: McpEndpoints.cs GetStatus()
  rpc GetStatus(GetStatusRequest) returns (McpStatusResponse);

  // Stop the MCP process gracefully.
  // Replaces: DELETE /api/mcp
  // Source: McpEndpoints.cs Stop()
  rpc Stop(StopRequest) returns (StopResponse);
}

message McpStartRequest {
  string command = 1;                    // e.g. "npx", "python", "node"
  repeated string arguments = 2;         // e.g. ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
  repeated string pre_exec_scripts = 3;  // e.g. ["pip install package"] — run before process launch
  int32 timeout_seconds = 4;             // Handshake timeout (default 30)
  optional string working_directory = 5; // WorkingDirectory from McpStdioConfigurationV1
}

message McpStartEvent {
  // Event types from current SSE implementation in StdioBridge.StartAsync():
  // "pre_exec_output" — stdout/stderr from pre-exec script
  // "pre_exec_complete" — pre-exec script finished
  // "pre_exec_failed" — pre-exec script failed
  // "process_started" — MCP process launched
  // "initializing" — sending initialize handshake
  // "ready" — MCP server responded to initialize, ready for requests
  // "error" — startup failed
  string event_type = 1;
  string message = 2;       // Human-readable status message
  optional string error = 3; // Error detail (set on "error" and "pre_exec_failed")
}

message JsonRpcRequest {
  string body = 1;  // Raw JSON-RPC request as string (opaque to manager)
  int32 timeout_seconds = 2;  // Per-request timeout (default 30)
}

message JsonRpcResponse {
  string body = 1;            // Raw JSON-RPC response as string
  bool is_notification = 2;   // True if the request was a notification (no response expected)
}

message StreamNotificationsRequest {}

message JsonRpcNotification {
  string body = 1;  // Raw JSON-RPC notification/request from server
}

message JsonRpcResponseMessage {
  string body = 1;  // Raw JSON-RPC response to send back to server via stdin
}

message SendResponseAck {
  bool success = 1;
}

message GetStatusRequest {}

message McpStatusResponse {
  // Maps to McpServerState enum in StdioBridge:
  // "Idle", "Initializing", "Ready", "Error", "Disposed"
  string state = 1;
  optional string error = 2;
  optional string started_at = 3;       // ISO8601
  optional string last_request_at = 4;  // ISO8601
}

message StopRequest {}

message StopResponse {
  bool success = 1;
}
