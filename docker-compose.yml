services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: donkeywork-postgres
    environment:
      POSTGRES_USER: donkeywork
      POSTGRES_PASSWORD: donkeywork_dev
      POSTGRES_DB: donkeywork_agents
    ports:
      - "5433:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U donkeywork -d donkeywork_agents"]
      interval: 10s
      timeout: 5s
      retries: 5

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: donkeywork-seaweedfs
    command: "server -s3 -dir=/data"
    ports:
      - "8333:8333"  # S3 API
      - "8888:8888"  # Filer
      - "9333:9333"  # Master
    volumes:
      - ./data/seaweedfs:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9333/cluster/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: donkeywork-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5673:5672"    # AMQP
      - "5553:5552"    # Stream protocol
      - "15673:15672"  # Management UI
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    command: >
      bash -c "rabbitmq-plugins enable rabbitmq_stream && rabbitmq-server"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: donkeywork-api
    ports:
      - "5050:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Persistence__ConnectionString: "Host=postgres;Port=5432;Database=donkeywork_agents;Username=donkeywork;Password=donkeywork_dev"
      Persistence__EncryptionKey: "dev-encryption-key-change-in-production"
      Storage__ServiceUrl: "http://seaweedfs:8333"
      Storage__AccessKey: "admin"
      Storage__SecretKey: "admin"
      Storage__DefaultBucket: "files"
      Storage__UsePathStyleAddressing: "true"
      Keycloak__FrontendUrl: "http://localhost:5199"
      RabbitMqStream__Host: "rabbitmq"
      RabbitMqStream__Port: "5552"
      RabbitMqStream__Username: "guest"
      RabbitMqStream__Password: "guest"
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  sandbox-manager:
    build:
      context: ./src/sandbox
      dockerfile: CodeSandbox.Manager/Dockerfile
    container_name: donkeywork-sandbox-manager
    ports:
      - "8668:8668"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
